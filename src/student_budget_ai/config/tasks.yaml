
analysis_task:
  description: >
    Проанализируй заявки клубов, приоритеты вуза, общий лимит бюджета и подготовь
    черновой план распределения средств.
  expected_output: >
    Структурированный анализ с краткими выводами, ключевыми проблемами, приоритетами,
    таблицей рекомендуемого финансирования по клубам и пояснениями по каждому решению.

final_task:
  description: >
    Используя анализ первого агента, оформи итоговое решение по распределению бюджета
    студенческого самоуправления.
  expected_output: >
    Финальный отчёт в markdown: краткое резюме, итоговая таблица распределения средств,
    логика решений, риски, рекомендации на будущее.
